<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hisab Jumal & Wafaq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap');
        .font-arabic { font-family: 'Amiri', serif; }
        .bg-scholarly { background-color: #0f172a; }
        .text-gold { color: #c5a059; }
        .border-gold { border-color: #c5a059; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <main class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-scholarly p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wide">Hisab Abajadun & Wafaq</h1>
            <p class="text-gold text-sm italic mt-1">Studi Numerik & Wafaq 3x3</p>
        </div>

        <div class="p-6">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Pilih Asmaul Husna:</label>
                <select id="asmaulSelect" onchange="selectAsmaul()" class="w-full p-4 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-amber-500 outline-none mb-4 h-14">
                    <option value="">-- Pilih Nama --</option>
                </select>
                <input type="text" id="arabicInput" placeholder="Ketik Arab: الله" 
                    class="w-full text-2xl p-4 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-arabic text-right mb-4">
                <button onclick="calculateJumal()" class="w-full bg-slate-900 text-white p-3 rounded-lg font-bold hover:bg-slate-800 transition">Hitung & Lihat Wafaq</button>
            </div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-amber-50 rounded-lg border border-amber-200">
                        <p class="text-gray-600 text-xs uppercase font-bold">Total Nilai</p>
                        <div id="totalValue" class="text-3xl font-bold text-slate-900"></div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <p class="text-gray-600 text-xs uppercase font-bold">Konstanta Magic</p>
                        <div id="magicConstant" class="text-3xl font-bold text-slate-900 font-arabic"></div>
                    </div>
                </div>
                
                <div class="border-t pt-4">
                    <p class="text-sm font-semibold text-gray-700 mb-3">Rincian Huruf:</p>
                    <div id="letterBreakdown" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="wafaqArea" class="border-t pt-6">
                    <p class="font-semibold text-gray-700 mb-4 text-center">Wafaq Al-Khali (3x3)</p>
                    <div id="wafaqGrid" class="grid grid-cols-3 gap-2 max-w-[240px] mx-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const abjadMap = {'ا': 1, 'ب': 2, 'ج': 3, 'د': 4, 'ه': 5, 'و': 6, 'ز': 7, 'ح': 8, 'ط': 9, 'ي': 10, 'ك': 20, 'ل': 30, 'م': 40, 'ن': 50, 'س': 60, 'ع': 70, 'ف': 80, 'ص': 90, 'ق': 100, 'ر': 200, 'ش': 300, 'ت': 400, 'ث': 500, 'خ': 600, 'ذ': 700, 'ض': 800, 'ظ': 900, 'غ': 1000};
        const asmaulHusna = {
            "Allah": "الله", "Ar-Rahman": "الرحمن", "Ar-Rahim": "الرحيم", "Al-Malik": "الملك", "Al-Quddus": "القدوس",
            "As-Salam": "السلام", "Al-Mu'min": "المؤمن", "Al-Muhaimin": "المهيمن", "Al-'Aziz": "العزيز", "Al-Jabbar": "الجبار",
            "Al-Mutakabbir": "المتكبر", "Al-Khaliq": "الخالق", "Al-Bari'": "البارئ", "Al-Mushawwir": "المصور", "Al-Ghaffar": "الغفار",
            "Al-Qahhar": "القهار", "Al-Wahhab": "الوهاب", "Ar-Razzaq": "الرزاق", "Al-Fattah": "الفتاح", "Al-'Alim": "العليم",
            "Al-Qabidh": "القابض", "Al-Basith": "الباسط", "Al-Khafidh": "الخافض", "Ar-Rafi'": "الرافع", "Al-Mu'izz": "المعز",
            "Al-Mudzhill": "المذل", "As-Sami'": "السميع", "Al-Bashir": "البصير", "Al-Hakam": "الحكم", "Al-'Adl": "العدل",
            "Al-Lathif": "اللطيف", "Al-Khabir": "الخبير", "Al-Halim": "الحليم", "Al-'Azhim": "العظيم", "Al-Ghafur": "الغفور",
            "Asy-Syakur": "الشكور", "Al-'Aliyy": "العلي", "Al-Kabir": "الكبير", "Al-Hafizh": "الحفيظ", "Al-Muqit": "المقيت",
            "Al-Hasib": "الحسيب", "Al-Jalil": "الجليل", "Al-Karim": "الكريم", "Ar-Raqib": "الرقيب", "Al-Mujib": "المجيب",
            "Al-Wasi'": "الواسع", "Al-Hakim": "الحكيم", "Al-Wadud": "الودود", "Al-Majid": "المجيد", "Al-Ba'its": "الباعث",
            "Asy-Syahid": "الشهيد", "Al-Haqq": "الحق", "Al-Wakil": "الوكيل", "Al-Qawiyyy": "القوي", "Al-Matin": "المتين",
            "Al-Waliyy": "الولي", "Al-Hamid": "الحميد", "Al-Muhshi": "المحصي", "Al-Mubdi'": "المبدئ", "Al-Mu'id": "المعيد",
            "Al-Muhyi": "المحيي", "Al-Mumit": "المميت", "Al-Hayyu": "الحي", "Al-Qayyum": "القيوم", "Al-Wajid": "الواجد",
            "Al-Majid_": "الماجد", "Al-Wahid": "الواحد", "Al-Ahad": "الأحد", "As-Samad": "الصمد", "Al-Qadir": "القادر",
            "Al-Muqtadir": "المقتدر", "Al-Muqaddim": "المقدم", "Al-Mu'akhkhir": "المؤخر", "Al-Awwal": "الأول", "Al-Akhir": "الآخر",
            "Azh-Zhahir": "الظاهر", "Al-Bathin": "الباطن", "Al-Wali": "الوالي", "Al-Muta'ali": "المتعالي", "Al-Barr": "البر",
            "At-Tawwab": "التواب", "Al-Muntaqim": "المنتقم", "Al-'Afuww": "العفو", "Ar-Ra'uf": "الرؤوف", "Malikul-Mulk": "مالك الملك",
            "Dzul-Jalali wal-Ikram": "ذو الجلال والإكرام", "Al-Muqsit": "المقسط", "Al-Jami'": "الجامع", "Al-Ghaniyy": "الغني",
            "Al-Mughni": "المغني", "Al-Mani'": "المانع", "Adh-Dharr": "الضار", "An-Nafi'": "النافع", "An-Nur": "النور",
            "Al-Hadi": "الهادي", "Al-Badi'": "البديع", "Al-Baqi": "الباقي", "Al-Warits": "الوارث", "Ar-Rasyid": "الرشيد",
            "As-Shabur": "الصبور"
        };

        const select = document.getElementById('asmaulSelect');
        Object.keys(asmaulHusna).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name + " (" + asmaulHusna[name] + ")";
            select.appendChild(opt);
        });

        function toArabicNum(num) {
            const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
            return num.toString().split('').map(d => map[d] || d).join('');
        }

        function selectAsmaul() {
            const val = select.value;
            if (val && asmaulHusna[val]) {
                document.getElementById('arabicInput').value = asmaulHusna[val];
                calculateJumal();
            }
        }

        function calculateJumal() {
            const input = document.getElementById('arabicInput').value;
            let total = 0;
            const breakdown = [];

            for (let char of input) {
                if (abjadMap[char]) {
                    total += abjadMap[char];
                    breakdown.push({ char, val: abjadMap[char] });
                }
            }

            if (total > 0) {
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('totalValue').innerText = total;
                document.getElementById('magicConstant').innerText = toArabicNum(total);
                
                // Render Breakdown
                const breakdownEl = document.getElementById('letterBreakdown');
                breakdownEl.innerHTML = breakdown.map(item => `
                    <div class="flex flex-col items-center bg-slate-50 border p-2 rounded-lg min-w-[50px]">
                        <span class="font-arabic text-2xl">${item.char}</span>
                        <span class="text-[10px] text-gray-500 font-bold">${item.val}</span>
                    </div>
                `).join('');

                renderWafaq(total);
            }
        }

        function renderWafaq(S) {
            // Formula Wafaq 3x3 Magic Square 
            // M = S / 3 (Magic Constant)
            // Pattern: 
            // M+1  M-1  M+2
            // M-2  M    M+2
            // M+1  M+1  M-2
            // Note: This produces a valid Magic Square 3x3 for any sum S divisible by 3
            
            const M = Math.floor(S / 3);
            const r = S % 3; // sisa untuk kompensasi
            
            // Generate matrix
            const matrix = [
                M+1, M-1, M+2,
                M+2, M,   M-2,
                M-1, M+1, M
            ];
            
            const gridEl = document.getElementById('wafaqGrid');
            gridEl.innerHTML = matrix.map(num => `
                <div class="h-16 w-16 flex items-center justify-center bg-slate-900 text-gold rounded-lg border border-gold font-arabic text-2xl shadow-sm">
                    ${toArabicNum(num + r)}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
